catalog:
  '@protobuf-ts/plugin': 2.11.1
  google-protobuf: 4.0.2

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - better-sqlite3
  - canvas
  - core-js-pure
  - esbuild
  - sharp
  - unrs-resolver
  - v-code-diff
  - vue-demi

ignoredBuiltDependencies:
  - maplibre-gl

packageExtensions:
  '@nuxtjs/mdc@0.20.1':
    dependencies:
      '@shikijs/engine-javascript': ^3.22.0

saveExact: true

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  canvas: true
  esbuild: true
  maplibre-gl: true
  sharp: true
  unrs-resolver: true
  v-code-diff: true
  vue-demi: true

minimumReleaseAge: 1440 # 1 day in minutes
