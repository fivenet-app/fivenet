# For details on buf.yaml configuration, visit https://buf.build/docs/configuration/v2/buf-yaml
version: v2
modules:
  - path: proto
deps:
  - buf.build/googleapis/googleapis
  - buf.build/bufbuild/protovalidate:v1.0.0
  - buf.build/srikrsna/protoc-gen-gotag
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    # Disabled to allow request/response messages to be shared, e.g.,
    # file store `UploadFileRequest` and `UploadFileResponse`
    - RPC_REQUEST_RESPONSE_UNIQUE
    # Allow for same standard response message in some services
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE_NO_DELETE
