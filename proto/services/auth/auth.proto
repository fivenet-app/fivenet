syntax = "proto3";

package services.auth;

import "buf/validate/validate.proto";
import "codegen/audit/redacted.proto";
import "codegen/perms/perms.proto";
import "codegen/sanitizer/sanitizer.proto";
import "resources/accounts/accounts.proto";
import "resources/accounts/oauth2/oauth2.proto";
import "resources/jobs/props/props.proto";
import "resources/permissions/attributes/attributes.proto";
import "resources/permissions/permissions/permissions.proto";
import "resources/timestamp/timestamp.proto";
import "resources/users/user.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/services/auth;auth";

message LoginRequest {
  string username = 1 [(buf.validate.field).string = {
    min_len: 3
    max_len: 24
    pattern: "(?i)^[0-9A-ZÄÖÜß_-]{3,24}$"
  }];
  string password = 2 [
    (buf.validate.field).string = {
      min_len: 6
      max_bytes: 70
    },
    (codegen.audit.redacted) = true
  ];
}

message LoginResponse {
  resources.timestamp.Timestamp expires = 1;
  int64 account_id = 2;
  optional ChooseCharacterResponse char = 3;
}

message LogoutRequest {}

message LogoutResponse {
  bool success = 1;
}

message CreateAccountRequest {
  string reg_token = 1 [
    (buf.validate.field).string = {
      len: 6
      pattern: "^[0-9]{6}$"
    },
    (codegen.audit.redacted) = true
  ];
  string username = 2 [
    (buf.validate.field).string = {
      min_len: 3
      max_len: 24
      pattern: "(?i)^[0-9A-ZÄÖÜß_-]{3,24}$"
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  string password = 3 [
    (buf.validate.field).string = {
      min_len: 6
      max_bytes: 70
    },
    (codegen.audit.redacted) = true
  ];
}

message CreateAccountResponse {
  int64 account_id = 1;
}

message ChangePasswordRequest {
  string current = 1 [
    (buf.validate.field).string = {
      min_len: 6
      max_bytes: 70
    },
    (codegen.audit.redacted) = true
  ];
  string new = 2 [
    (buf.validate.field).string = {
      min_len: 6
      max_bytes: 70
    },
    (codegen.audit.redacted) = true
  ];
}

message ChangePasswordResponse {}

message ChangeUsernameRequest {
  string current = 1 [(buf.validate.field).string = {
    min_len: 3
    max_len: 24
    pattern: "(?i)^[0-9A-ZÄÖÜß_-]{3,24}$"
  }];
  string new = 2 [
    (buf.validate.field).string = {
      min_len: 3
      max_len: 24
      pattern: "(?i)^[0-9A-ZÄÖÜß_-]{3,24}$"
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
}

message ChangeUsernameResponse {}

message ForgotPasswordRequest {
  string reg_token = 1 [
    (buf.validate.field).string = {
      len: 6
      pattern: "^[0-9]{6}$"
    },
    (codegen.audit.redacted) = true
  ];
  string new = 2 [
    (buf.validate.field).string = {
      min_len: 6
      max_bytes: 70
    },
    (codegen.audit.redacted) = true
  ];
}

message ForgotPasswordResponse {}

message GetAccountInfoRequest {}

message GetAccountInfoResponse {
  resources.accounts.Account account = 1;
  repeated resources.accounts.oauth2.OAuth2Provider oauth2_providers = 2;
  repeated resources.accounts.oauth2.OAuth2Account oauth2_connections = 3;
}

message GetCharactersRequest {}

message GetCharactersResponse {
  repeated resources.accounts.Character chars = 1;
}

message ChooseCharacterRequest {
  int32 char_id = 1 [(buf.validate.field).int32.gt = 0];
}

message ChooseCharacterResponse {
  string token = 1;
  string username = 2;

  resources.timestamp.Timestamp expires = 3;
  resources.jobs.props.JobProps job_props = 4;
  resources.users.User char = 5 [(tagger.tags) = "alias:\"user\""];

  repeated resources.permissions.permissions.Permission permissions = 6;
  repeated resources.permissions.attributes.RoleAttribute attributes = 7;
}

message ImpersonateJobRequest {
  int32 job_grade = 1 [(buf.validate.field).int32.gte = 0];
}

message ImpersonateJobResponse {
  string token = 1;
  resources.timestamp.Timestamp expires = 2;

  resources.users.User char = 3 [(tagger.tags) = "alias:\"user\""];

  repeated resources.permissions.permissions.Permission permissions = 4;
  repeated resources.permissions.attributes.RoleAttribute attributes = 5;

  bool state = 6;
}

message DeleteSocialLoginRequest {
  string provider = 1 [
    (buf.validate.field).string.max_len = 50,
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
}

message DeleteSocialLoginResponse {
  bool success = 1;
}

message SetSuperuserModeRequest {
  bool superuser = 1;
  optional string job = 2 [(buf.validate.field).string.max_len = 20];
}

message SetSuperuserModeResponse {
  string token = 1;
  resources.timestamp.Timestamp expires = 2;

  optional resources.jobs.props.JobProps job_props = 3;
  resources.users.User char = 4 [(tagger.tags) = "alias:\"user\""];

  repeated resources.permissions.permissions.Permission permissions = 5;
  repeated resources.permissions.attributes.RoleAttribute attributes = 6;
}

// Auth Service handles user authentication, character selection and oauth2 connections
// Some methods **must** be caled via HTTP-based GRPC web request to allow cookies to be set/unset.
service AuthService {
  option (codegen.perms.perms_svc) = {
    order: 0
    icon: "i-mdi-key-outline"
  };

  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc ChangeUsername(ChangeUsernameRequest) returns (ChangeUsernameResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);

  rpc GetCharacters(GetCharactersRequest) returns (GetCharactersResponse);
  rpc ChooseCharacter(ChooseCharacterRequest) returns (ChooseCharacterResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }

  rpc ImpersonateJob(ImpersonateJobRequest) returns (ImpersonateJobResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      service: "settings.SettingsService"
      name: "UpdateRolePerms"
    };
  }

  rpc GetAccountInfo(GetAccountInfoRequest) returns (GetAccountInfoResponse);

  rpc DeleteSocialLogin(DeleteSocialLoginRequest) returns (DeleteSocialLoginResponse);

  rpc SetSuperuserMode(SetSuperuserModeRequest) returns (SetSuperuserModeResponse);
}
