syntax = "proto3";

package services.jobs;

import "buf/validate/validate.proto";
import "codegen/itemslen/itemslen.proto";
import "codegen/perms/perms.proto";
import "resources/common/database/database.proto";
import "resources/file/filestore.proto";
import "resources/jobs/conduct/conduct.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/services/jobs;jobs";

// Conduct Register

message ListConductEntriesRequest {
  resources.common.database.PaginationRequest pagination = 1 [(buf.validate.field).required = true];
  optional resources.common.database.Sort sort = 2;
  // Search params
  repeated resources.jobs.conduct.ConductType types = 3;
  optional bool show_expired = 4;
  optional bool show_drafts = 5;
  repeated int32 user_ids = 6;
  repeated int64 ids = 7;
}

message ListConductEntriesResponse {
  resources.common.database.PaginationResponse pagination = 1 [(buf.validate.field).required = true];
  repeated resources.jobs.conduct.ConductEntry entries = 2 [(codegen.itemslen.enabled) = true];
}

message GetConductEntryRequest {
  int64 id = 1 [(buf.validate.field).required = true];
}

message GetConductEntryResponse {
  resources.jobs.conduct.ConductEntry entry = 1 [(buf.validate.field).required = true];
}

message CreateConductEntryRequest {
  resources.jobs.conduct.ConductEntry entry = 1 [(buf.validate.field).required = true];
}

message CreateConductEntryResponse {
  resources.jobs.conduct.ConductEntry entry = 1;
}

message UpdateConductEntryRequest {
  resources.jobs.conduct.ConductEntry entry = 1 [(buf.validate.field).required = true];
}

message UpdateConductEntryResponse {
  resources.jobs.conduct.ConductEntry entry = 1 [(buf.validate.field).required = true];
}

message DeleteConductEntryRequest {
  int64 id = 1;
}

message DeleteConductEntryResponse {}

service ConductService {
  option (codegen.perms.perms_svc) = {
    order: 67
    icon: "i-mdi-list-status"
  };

  rpc ListConductEntries(ListConductEntriesRequest) returns (ListConductEntriesResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      attrs: [
        {
          key: "Access"
          type: ATTRIBUTE_TYPE_STRING_LIST
          valid_string_list: [
            "Own",
            "All"
          ]
        }
      ]
    };
  }
  rpc GetConductEntry(GetConductEntryRequest) returns (GetConductEntryResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      name: "ListConductEntries"
    };
  }

  rpc CreateConductEntry(CreateConductEntryRequest) returns (CreateConductEntryResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }
  rpc UpdateConductEntry(UpdateConductEntryRequest) returns (UpdateConductEntryResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }
  rpc DeleteConductEntry(DeleteConductEntryRequest) returns (DeleteConductEntryResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }

  rpc UploadFile(stream resources.file.UploadFileRequest) returns (resources.file.UploadFileResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      names: [
        "CreateConductEntry",
        "UpdateConductEntry"
      ]
    };
  }
}
