syntax = "proto3";

package services.jobs;

import "buf/validate/validate.proto";
import "codegen/perms/perms.proto";
import "codegen/sanitizer/sanitizer.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/services/jobs;jobs";

message GetMOTDRequest {}

message GetMOTDResponse {
  string motd = 1;
}

message SetMOTDRequest {
  string motd = 1 [
    (buf.validate.field).string.max_len = 1024,
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
}

message SetMOTDResponse {
  string motd = 1;
}

service JobsService {
  option (codegen.perms.perms_svc) = {
    order: 60
    icon: "i-mdi-briefcase-outline"
  };

  rpc GetMOTD(GetMOTDRequest) returns (GetMOTDResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      name: "Any"
    };
  }
  rpc SetMOTD(SetMOTDRequest) returns (SetMOTDResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }
}
