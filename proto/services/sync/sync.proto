syntax = "proto3";

package services.sync;

import "buf/validate/validate.proto";
import "resources/centrum/dispatches/dispatches.proto";
import "resources/jobs/colleagues/activity/activity.proto";
import "resources/sync/activity/activity.proto";
import "resources/sync/data/data.proto";
import "resources/users/activity/activity.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/services/sync;sync";

message GetStatusRequest {}

message GetStatusResponse {
  resources.sync.data.DataStatus jobs = 1;
  resources.sync.data.DataStatus licenses = 2;

  resources.sync.data.DataStatus accounts = 5;
  resources.sync.data.DataStatus users = 3;
  resources.sync.data.DataStatus vehicles = 4;
}

message AddActivityRequest {
  oneof activity {
    option (buf.validate.oneof).required = true;

    resources.sync.activity.UserOAuth2Conn user_oauth2 = 1;

    resources.centrum.dispatches.Dispatch dispatch = 2;

    // User activity
    resources.users.activity.UserActivity user_activity = 3;
    // Setting props will cause activity to be created automtically
    resources.sync.activity.UserProps user_props = 4;

    // Jobs user activity
    resources.jobs.colleagues.activity.ColleagueActivity colleague_activity = 5;
    // Setting props will cause activity to be created automtically
    resources.sync.activity.ColleagueProps colleague_props = 6;
    // Timeclock user entry
    resources.sync.activity.TimeclockUpdate job_timeclock = 7;

    // Account update for a signle account to update the group(s).
    resources.sync.activity.AccountUpdate account_update = 9;
    // User/Char info updates that aren't tracked by activity (yet)
    resources.sync.activity.UserUpdate user_update = 8;
  }
}

message AddActivityResponse {}

message RegisterAccountRequest {
  string identifier = 1 [(buf.validate.field).string.max_len = 64];
  bool reset_token = 2;
  optional int32 last_char_id = 3 [(buf.validate.field).int32.gt = 0];
}

message RegisterAccountResponse {
  optional string reg_token = 1 [(buf.validate.field).string = {
    len: 6
    pattern: "^[0-9]{6}$"
  }];
  optional int64 account_id = 2;
  optional string username = 3;
}

message TransferAccountRequest {
  string old_license = 1 [(buf.validate.field).string.max_len = 64];
  string new_license = 2 [(buf.validate.field).string.max_len = 64];
}

message TransferAccountResponse {}

message SendDataRequest {
  oneof data {
    option (buf.validate.oneof).required = true;

    resources.sync.data.DataJobs jobs = 1;
    resources.sync.data.DataLicenses licenses = 2;

    resources.sync.data.DataAccounts accounts = 9;
    resources.sync.data.DataUsers users = 3;
    resources.sync.data.DataVehicles vehicles = 4;

    resources.sync.data.DataUserLocations user_locations = 5;

    resources.sync.data.LastCharID last_char_id = 6;
  }
}

message SendDataResponse {
  int64 affected_rows = 1;
}

message DeleteDataRequest {
  oneof data {
    option (buf.validate.oneof).required = true;

    resources.sync.data.DeleteUsers users = 1;
    resources.sync.data.DeleteVehicles vehicles = 2;
  }
}

message DeleteDataResponse {
  int64 affected_rows = 1;
}

message StreamRequest {
  optional string version = 1 [(buf.validate.field).string.max_len = 32];
}

message StreamResponse {
  int32 user_id = 1;
}

// Sync Service handles the sync of data (e.g., users, jobs) to this FiveNet instance and API calls
// from the plugin (e.g., user activity, user props changes).
service SyncService {
  // Get basic "sync state" from server side (currently simply the count of records on the server side).
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // For "tracking" activity such as "user received traffic infraction points", timeclock entries, etc.
  rpc AddActivity(AddActivityRequest) returns (AddActivityResponse);

  // Get registration token for a new user account or return the account id and username, for a given identifier/license.
  rpc RegisterAccount(RegisterAccountRequest) returns (RegisterAccountResponse);
  // Transfer account from one license to another
  rpc TransferAccount(TransferAccountRequest) returns (TransferAccountResponse);

  // DBSync's method of sending (mass) data to the FiveNet server for storing.
  rpc SendData(SendDataRequest) returns (SendDataResponse);
  // Way for the gameserver to delete certain data as well
  rpc DeleteData(DeleteDataRequest) returns (DeleteDataResponse);

  // Used for the server to stream events to the dbsync (e.g., "refresh" of user/char data)
  rpc Stream(StreamRequest) returns (stream StreamResponse);
}
