syntax = "proto3";

package services.centrum;

import "buf/validate/validate.proto";
import "codegen/perms/perms.proto";
import "resources/centrum/dispatchers/dispatchers.proto";
import "resources/centrum/dispatches/dispatches.proto";
import "resources/centrum/settings/settings.proto";
import "resources/centrum/units/units.proto";
import "resources/livemap/heatmap/heatmap.proto";
import "resources/timestamp/timestamp.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/services/centrum;centrum";

// Settings

message GetSettingsRequest {}

message GetSettingsResponse {
  resources.centrum.settings.Settings settings = 1;
  resources.centrum.settings.EffectiveAccess effective_access = 2;
}

message UpdateSettingsRequest {
  resources.centrum.settings.Settings settings = 1;
}

message UpdateSettingsResponse {
  resources.centrum.settings.Settings settings = 1;
}

// Heatmap

message GetDispatchHeatmapRequest {}

message GetDispatchHeatmapResponse {
  int32 max_entries = 1;
  repeated resources.livemap.heatmap.HeatmapEntry entries = 2;
}

// Dispatchers

message TakeControlRequest {
  bool signon = 1;
}

message TakeControlResponse {}

message UpdateDispatchersRequest {
  repeated int32 to_remove = 1 [(buf.validate.field).repeated.max_items = 10];
}

message UpdateDispatchersResponse {
  resources.centrum.dispatchers.Dispatchers dispatchers = 1;
}

message StreamHandshake {
  resources.timestamp.Timestamp server_time = 1;
  resources.centrum.settings.Settings settings = 2;
  resources.centrum.settings.EffectiveAccess access = 3;
}

message LatestState {
  resources.centrum.dispatchers.JobDispatchers dispatchers = 1;
  optional int64 own_unit_id = 2;
  // Send the current units and dispatches
  repeated resources.centrum.units.Unit units = 3;
  repeated resources.centrum.dispatches.Dispatch dispatches = 4;
}

message StreamRequest {}

message StreamResponse {
  oneof change {
    option (buf.validate.oneof).required = true;

    StreamHandshake handshake = 1;
    LatestState latest_state = 2;

    resources.centrum.settings.Settings settings = 3;
    resources.centrum.settings.EffectiveAccess access = 4;
    resources.centrum.dispatchers.Dispatchers dispatchers = 5;

    int64 unit_deleted = 6;
    resources.centrum.units.Unit unit_updated = 7;
    resources.centrum.units.UnitStatus unit_status = 8;

    int64 dispatch_deleted = 9;
    resources.centrum.dispatches.Dispatch dispatch_updated = 10;
    resources.centrum.dispatches.DispatchStatus dispatch_status = 11;
  }
}

service CentrumService {
  option (codegen.perms.perms_svc) = {
    order: 100
    icon: "i-mdi-car-emergency"
  };

  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      name: "Stream"
    };
  }

  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      attrs: [
        {
          key: "Access"
          type: ATTRIBUTE_TYPE_STRING_LIST
          valid_string_list: [
            "Shared",
            "Public"
          ]
        }
      ]
    };
  }

  rpc GetDispatchHeatmap(GetDispatchHeatmapRequest) returns (GetDispatchHeatmapResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      name: "TakeControl"
    };
  }

  rpc TakeControl(TakeControlRequest) returns (TakeControlResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }

  rpc UpdateDispatchers(UpdateDispatchersRequest) returns (UpdateDispatchersResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }

  rpc Stream(StreamRequest) returns (stream StreamResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }
}
