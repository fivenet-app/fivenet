syntax = "proto3";

package services.documents;

import "codegen/perms/perms.proto";
import "resources/timestamp/timestamp.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/services/documents;documents";

message GetStatsRequest {
  resources.timestamp.Timestamp start = 1;
  resources.timestamp.Timestamp end = 2;
  StatsPeriod period = 3;

  StatsCategory category = 4;
  optional string custom_category = 5;
}

enum StatsCategory {
  STATS_CATEGORY_UNSPECIFIED = 0;
  STATS_CATEGORY_CUSTOM = 1;
  STATS_CATEGORY_DOCUMENTS_BY_CATEGORY = 2;
  STATS_CATEGORY_TOP_LAWS = 3;
  STATS_CATEGORY_PENALTIES_OVER_TIME = 4;
}

enum StatsPeriod {
  STATS_PERIOD_UNSPECIFIED = 0;
  STATS_PERIOD_DAILY = 1;
  STATS_PERIOD_WEEKLY = 2;
  STATS_PERIOD_MONTHLY = 3;
}

message KeyValue {
  string key = 1;
  int64 value = 2;
}

message DailyValue {
  resources.timestamp.Timestamp day = 1;
  int64 value = 2;
}

message PeriodSeriesValue {
  resources.timestamp.Timestamp day = 1;
  string key = 2;
  string label = 3;
  int64 value = 4;
}

message CategoryValue {
  int64 id = 1;
  string name = 2;
  string color = 3;
  int64 value = 4;
}

message GetStatsResponse {
  repeated KeyValue top_laws = 1;
  repeated DailyValue fines_over_time = 2;
  repeated CategoryValue documents_by_category = 3;
  int64 reduction_percent_sum = 4;
  int64 case_count_sum = 5;
  repeated DailyValue period_values = 6;
  int64 total_value = 7;
  repeated PeriodSeriesValue period_series_values = 8;
}

service StatsService {
  option (codegen.perms.perms_svc) = {
    order: 58
    icon: "i-mdi-graph-box-multiple-outline"
  };

  rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      attrs: [
        {
          key: "Categories"
          type: ATTRIBUTE_TYPE_STRING_LIST
          valid_string_list: ["PenaltyCalculator"]
        }
      ]
    };
  }
}
