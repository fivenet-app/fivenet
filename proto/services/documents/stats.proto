syntax = "proto3";

package services.documents;

import "buf/validate/validate.proto";
import "codegen/perms/perms.proto";
import "resources/stats/stats.proto";
import "resources/timestamp/timestamp.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/services/documents;documents";

message GetStatsRequest {
  resources.timestamp.Timestamp start = 1;
  resources.timestamp.Timestamp end = 2;

  resources.stats.StatsPeriod period = 3 [(buf.validate.field).enum.defined_only = true];
  resources.stats.StatsCategory category = 4 [(buf.validate.field).enum.defined_only = true];
}

message GetStatsResponse {
  repeated resources.stats.KeyValue top_laws = 1;
  repeated resources.stats.DailyValue fines_over_time = 2;
  repeated resources.stats.CategoryValue documents_by_category = 3;
  repeated resources.stats.DailyValue period_values = 4;
  repeated resources.stats.PeriodSeriesValue period_series_values = 5;

  int64 total_value = 6;
  double average_value = 7;
}

service StatsService {
  option (codegen.perms.perms_svc) = {
    order: 58
    icon: "i-mdi-graph-box-multiple-outline"
  };

  rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      attrs: [
        {
          key: "Categories"
          type: ATTRIBUTE_TYPE_STRING_LIST
          valid_string_list: ["PenaltyCalculator"]
        }
      ]
    };
  }
}
