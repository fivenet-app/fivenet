syntax = "proto3";

package services.citizens;

import "buf/validate/validate.proto";
import "codegen/perms/perms.proto";
import "resources/citizens/labels/access.proto";
import "resources/citizens/labels/labels.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/services/citizens;citizens";

message ListLabelsRequest {
  optional string search = 1 [(buf.validate.field).string.max_len = 64];
  optional resources.citizens.labels.AccessLevel min_access = 2 [(buf.validate.field).enum.defined_only = true];
  optional bool own_job_only = 3;
}

message ListLabelsResponse {
  repeated resources.citizens.labels.Label labels = 1;
}

message GetLabelRequest {
  int64 id = 1 [(buf.validate.field).int64.gt = 0];
}

message GetLabelResponse {
  resources.citizens.labels.Label label = 1;
}

message CreateOrUpdateLabelRequest {
  resources.citizens.labels.Label label = 1 [(buf.validate.field).required = true];
}

message CreateOrUpdateLabelResponse {
  resources.citizens.labels.Label label = 1;
}

message DeleteLabelRequest {
  int64 id = 1 [(buf.validate.field).int64.gt = 0];
}

message DeleteLabelResponse {}

message ReorderLabelsRequest {
  repeated int64 label_ids = 1 [(buf.validate.field).repeated = {
    items: {
      int64: {gt: 0}
    }
    min_items: 1
    max_items: 50
  }];
}

message ReorderLabelsResponse {}

service LabelsService {
  option (codegen.perms.perms_svc) = {
    order: 32
    icon: "i-mdi-label-multiple"
  };

  rpc ListLabels(ListLabelsRequest) returns (ListLabelsResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }

  rpc GetLabel(GetLabelRequest) returns (GetLabelResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      name: "ListLabels"
    };
  }

  rpc CreateOrUpdateLabel(CreateOrUpdateLabelRequest) returns (CreateOrUpdateLabelResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }

  rpc DeleteLabel(DeleteLabelRequest) returns (DeleteLabelResponse) {
    option (codegen.perms.perms) = {enabled: true};
  }

  rpc ReorderLabels(ReorderLabelsRequest) returns (ReorderLabelsResponse) {
    option (codegen.perms.perms) = {
      enabled: true
      name: "CreateOrUpdateLabel"
    };
  }
}
