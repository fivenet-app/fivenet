syntax = "proto3";

package resources.common.content;

import "buf/validate/validate.proto";
import "codegen/sanitizer/sanitizer.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/common/content;content";

enum ContentType {
  CONTENT_TYPE_UNSPECIFIED = 0;
  // Used for legacy HTML content
  CONTENT_TYPE_HTML = 1;
  // Used for Tiptap JSON content
  CONTENT_TYPE_TIPTAP_JSON = 2;
}

message Content {
  string version = 1 [(buf.validate.field).string.max_len = 24];
  ContentType content_type = 2 [(buf.validate.field).enum.defined_only = true];

  // Deprecated: Legacy HTML (only for viewing old content)
  optional string raw_html = 3;
  // Deprecated: Legacy custom HTML to JSON AST (only for viewing old content)
  optional RichTextHtmlNode content = 4;

  // Tiptap JSON Document
  google.protobuf.Struct tiptap_json = 5 [(codegen.sanitizer.sanitizer) = {
    enabled: true
    tiptap_json: true
  }];
}

enum NodeType {
  NODE_TYPE_UNSPECIFIED = 0;

  NODE_TYPE_DOC = 1;

  NODE_TYPE_ELEMENT = 2;
  NODE_TYPE_TEXT = 3;
  NODE_TYPE_COMMENT = 4;
}

message RichTextHtmlNode {
  NodeType type = 1 [(buf.validate.field).enum.defined_only = true];
  optional string id = 2 [(codegen.sanitizer.sanitizer) = {
    enabled: true
    strip_html_tags: true
  }];
  string tag = 3 [(codegen.sanitizer.sanitizer) = {
    enabled: true
    strip_html_tags: true
  }];
  map<string, string> attrs = 4 [(codegen.sanitizer.sanitizer) = {
    enabled: true
    strip_html_tags: true
  }];
  optional string text = 5 [(codegen.sanitizer.sanitizer) = {
    enabled: true
    strip_html_tags: true
  }];
  repeated RichTextHtmlNode content = 6;
}

message ExtractedContent {
  string text = 1;
  uint32 word_count = 2;
  string first_heading = 3;
}
