syntax = "proto3";

package resources.sync.data;

import "buf/validate/validate.proto";
import "resources/jobs/jobs.proto";
import "resources/livemap/coords.proto";
import "resources/users/licenses/licenses.proto";
import "resources/users/props/props.proto";
import "resources/users/user.proto";
import "resources/sync/activity/activity.proto";
import "resources/vehicles/vehicles.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/sync/data;syncdata";

message DataStatus {
  int64 count = 1;
}

message DataJobs {
  repeated resources.jobs.Job jobs = 1 [(buf.validate.field).repeated.max_items = 200];
}

message DataUsers {
  repeated DataUser users = 1 [(buf.validate.field).repeated.max_items = 500];
}

message DataVehicles {
  repeated resources.vehicles.Vehicle vehicles = 1 [(buf.validate.field).repeated.max_items = 1000];
}

message DataLicenses {
  repeated resources.users.licenses.License licenses = 1 [(buf.validate.field).repeated.max_items = 200];
}

message DataUserLocations {
  repeated CitizenLocations users = 1 [(buf.validate.field).repeated.max_items = 2000];
  optional bool clear_all = 2;
}

message CitizenLocations {
  string identifier = 1 [(buf.validate.field).string.max_len = 64];
  string job = 2 [(buf.validate.field).string.max_len = 20];
  optional int32 job_grade = 6 [(buf.validate.field).int32.gte = 0];
  resources.livemap.Coords coords = 3 [(buf.validate.field).required = true];
  bool hidden = 4;
  bool remove = 5;
}

message DeleteUsers {
  repeated int32 user_ids = 1 [(buf.validate.field).repeated.max_items = 100];
}

message DeleteVehicles {
  repeated string plates = 1 [(buf.validate.field).repeated.max_items = 100];
}

message LastCharID {
  string identifier = 1 [(buf.validate.field).string.max_len = 64];
  optional int32 last_char_id = 2 [(buf.validate.field).int32.gt = 0];
}

message DataAccounts {
  repeated resources.sync.activity.AccountUpdate account_updates = 1 [(buf.validate.field).repeated.max_items = 100];
}

// Detailed user information for sync purposes
// Should be kept inline with `resources.users.User`.
message DataUser {
  int32 user_id = 1 [
    (buf.validate.field).int32.gt = 0
  ];
  optional string identifier = 2 [(buf.validate.field).string.max_len = 64];

  string job = 3 [
    (buf.validate.field).string.max_len = 20,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  optional string job_label = 4 [(buf.validate.field).string.max_len = 50];
  int32 job_grade = 5 [
    (buf.validate.field).int32.gte = 0,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  optional string job_grade_label = 6 [(buf.validate.field).string.max_len = 50];
  repeated resources.users.UserJob jobs = 20 [
    (buf.validate.field).repeated.max_items = 3,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  string firstname = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  optional string lastname = 8 [
    (buf.validate.field).string = {
      min_len: 1
      max_len: 50
    }
  ];

  string dateofbirth = 9 [
    (buf.validate.field).string.max_len = 10,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  optional string sex = 10 [(buf.validate.field).string = {
    min_len: 1
    max_len: 2
  }];
  optional string height = 11;

  optional string phone_number = 12 [(buf.validate.field).string.max_len = 20];
  repeated resources.users.PhoneNumber phone_numbers = 19 [
    (buf.validate.field).repeated.max_items = 5,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  optional int32 visum = 13 [(buf.validate.field).int32.gte = 0];
  optional int32 playtime = 14 [(buf.validate.field).int32.gte = 0];

  optional resources.users.props.UserProps props = 15;
  repeated resources.users.licenses.License licenses = 16;

  optional int64 profile_picture_file_id = 17;
  optional string profile_picture = 18;
}
