syntax = "proto3";

package resources.sync.data.v2;

import "buf/validate/validate.proto";
import "resources/citizens/licenses/licenses.proto";
import "resources/users/user.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/sync/data/v2;syncdatav2";

message DataUserJobs {
  int32 user_id = 1 [(buf.validate.field).int32.gt = 0];
  repeated resources.users.UserJob jobs = 2 [(buf.validate.field).repeated.max_items = 5];
}

message DataUserPhoneNumbers {
  int32 user_id = 1 [(buf.validate.field).int32.gt = 0];
  repeated resources.users.PhoneNumber phone_numbers = 2 [(buf.validate.field).repeated.max_items = 5];
}

message DataUserLicenses {
  int32 user_id = 1 [(buf.validate.field).int32.gt = 0];
  repeated resources.citizens.licenses.License licenses = 2 [(buf.validate.field).repeated.max_items = 20];
}
