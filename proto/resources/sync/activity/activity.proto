syntax = "proto3";

package resources.sync.activity;

import "buf/validate/validate.proto";
import "resources/jobs/colleagues/colleagues.proto";
import "resources/users/props/props.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/sync/activity;syncactivity";

// Connect an identifier/license to the provider with the specified external id
// (e.g., auto discord social connect on server join)
message UserOAuth2Conn {
  string provider_name = 1;
  string identifier = 2;
  string external_id = 3;
  string username = 4;
}

message UserProps {
  optional string reason = 1 [(buf.validate.field).string.max_len = 255];
  resources.users.props.UserProps props = 2 [(buf.validate.field).required = true];
}

message ColleagueProps {
  optional string reason = 1 [(buf.validate.field).string.max_len = 255];
  resources.jobs.colleagues.ColleagueProps props = 2 [(buf.validate.field).required = true];
}

message UserUpdate {
  int32 user_id = 1;
  optional string group = 2;

  // Char details
  optional string job = 3 [(buf.validate.field).string.max_len = 20];
  optional int32 job_grade = 4 [(buf.validate.field).int32.gte = 0];
  optional string firstname = 5;
  optional string lastname = 6;
}

message TimeclockUpdate {
  string job = 1;
  int32 user_id = 2;
  bool start = 3;
}

message AccountUpdate {
  string license = 1 [(buf.validate.field).string.max_len = 64];

  optional string group = 2;
  repeated string groups = 3;
}
