syntax = "proto3";

package resources.jobs.groups;

import "buf/validate/validate.proto";
import "resources/common/content/content.proto";
import "resources/file/file.proto";
import "resources/jobs/colleagues/colleagues.proto";
import "resources/timestamp/timestamp.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/jobs/groups;jobsgroups";

enum GroupType {
  GROUP_TYPE_UNSPECIFIED = 0;

  // Membership is only based on explicitly added manual members.
  GROUP_TYPE_MANUAL = 1;

  // Membership is derived from rules, such as grade/rank or qualifications.
  GROUP_TYPE_SMART = 2;

  // Membership is derived from rules and adjusted by manual includes/exclusions.
  GROUP_TYPE_MIXED = 3;
}

enum GroupState {
  GROUP_STATE_UNSPECIFIED = 0;

  // Group is active and appears in normal group filters/lists.
  GROUP_STATE_ACTIVE = 1;

  // Group still exists but is hidden from default operational views.
  GROUP_STATE_INACTIVE = 2;

  // Group is no longer used for current operations, but remains available for history/activity logs.
  GROUP_STATE_ARCHIVED = 3;
}

enum GroupMembershipMode {
  GROUP_MEMBERSHIP_MODE_UNSPECIFIED = 0;

  // Manual members may be added even if they do not match the group's rules.
  GROUP_MEMBERSHIP_MODE_FLEXIBLE = 1;

  // Manual members must satisfy the group's rules.
  GROUP_MEMBERSHIP_MODE_STRICT = 2;
}

message Group {
  int64 id = 1;

  // Job this group belongs to. Groups are job-local initially.
  int64 job_id = 2;

  // Main display name, e.g. "Traffic Unit" or "Command Staff".
  string name = 3;

  // Optional longer explanation of the group's purpose.
  optional string description = 4;

  // Optional compact display name, e.g. "TRF" or "CMD".
  optional string short_name = 5;

  // Optional file/avatar/logo reference.
  optional string logo_file_id = 6;

  // Optional UI color, e.g. hex color or predefined token depending on frontend convention.
  optional string color = 7;

  // Describes the broad membership behavior.
  // This can also be derived from rules/manual members, but storing it can simplify UI.
  GroupType type = 8;

  // Current lifecycle state.
  GroupState state = 9;

  // Controls whether manually added members must satisfy smart membership rules.
  GroupMembershipMode membership_mode = 10;

  // Manual ordering for group lists.
  int32 sort_order = 11;

  // Cached/resolved count of current non-excluded members.
  int32 members_count = 12;

  // Cached count of assigned group leaders.
  int32 leaders_count = 13;

  // Cached count of enabled/defined membership rules.
  int32 rules_count = 14;

  // Cached count of manual exclusions.
  int32 exclusions_count = 15;

  // User who created the group.
  int64 created_by_user_id = 16;

  // User who last updated the group metadata.
  int64 updated_by_user_id = 17;

  resources.timestamp.Timestamp created_at = 18;
  optional resources.timestamp.Timestamp updated_at = 19;

  // Set when the group is archived.
  optional resources.timestamp.Timestamp archived_at = 20;
}

message GroupLeader {
  // Group this leader relation belongs to.
  int64 group_id = 1;

  // User who can manage/supervise the group.
  // A leader does not automatically have to be a member.
  int64 user_id = 2;

  // User who assigned this leader.
  int64 created_by_user_id = 3;

  resources.timestamp.Timestamp created_at = 4;
}

message GroupManualMember {
  // Group this manual member relation belongs to.
  int64 group_id = 1;

  // User explicitly added to the group.
  int64 user_id = 2;

  // Optional admin/leader-provided reason for the manual assignment.
  optional string reason = 3;

  // User who added this manual member.
  int64 created_by_user_id = 4;

  resources.timestamp.Timestamp created_at = 5;
}

enum GroupExclusionReason {
  GROUP_EXCLUSION_REASON_UNSPECIFIED = 0;

  // Generic manual exclusion.
  GROUP_EXCLUSION_REASON_MANUAL = 1;

  // Temporary exclusion, e.g. paused assignment or temporary reassignment.
  GROUP_EXCLUSION_REASON_TEMPORARY = 2;

  // User technically matches a rule but should not be considered eligible.
  GROUP_EXCLUSION_REASON_NOT_ELIGIBLE = 3;

  // Any other reason described in the free-text reason field.
  GROUP_EXCLUSION_REASON_OTHER = 4;
}

message GroupMemberExclusion {
  // Group this exclusion belongs to.
  int64 group_id = 1;

  // User excluded from resolved group membership.
  int64 user_id = 2;

  // Structured exclusion reason.
  GroupExclusionReason reason_type = 3;

  // Optional human-readable reason.
  optional string reason = 4;

  // User who created the exclusion.
  int64 created_by_user_id = 5;

  resources.timestamp.Timestamp created_at = 6;
}

enum GroupGradeRuleType {
  GROUP_GRADE_RULE_TYPE_UNSPECIFIED = 0;

  // Match users with grade >= grade.
  GROUP_GRADE_RULE_TYPE_MINIMUM = 1;

  // Match users with grade == grade.
  GROUP_GRADE_RULE_TYPE_EXACT = 2;

  // Match users with min_grade <= grade <= max_grade.
  GROUP_GRADE_RULE_TYPE_RANGE = 3;
}

message GroupGradeRule {
  // Determines which grade fields are used.
  GroupGradeRuleType type = 1;

  // Used by MINIMUM and EXACT.
  optional int32 grade = 2;

  // Used by RANGE.
  optional int32 min_grade = 3;

  // Used by RANGE.
  optional int32 max_grade = 4;
}

enum GroupQualificationRuleType {
  GROUP_QUALIFICATION_RULE_TYPE_UNSPECIFIED = 0;

  // User must have all listed qualifications.
  GROUP_QUALIFICATION_RULE_TYPE_ALL = 1;

  // User must have at least one listed qualification.
  GROUP_QUALIFICATION_RULE_TYPE_ANY = 2;
}

message GroupQualificationRule {
  // Determines whether all or any listed qualifications are required.
  GroupQualificationRuleType type = 1;

  // Qualification IDs checked by this rule.
  repeated int64 qualification_ids = 2;

  // If true, only completed/successful qualifications count.
  bool require_completed = 3;
}

message GroupRule {
  int64 id = 1;

  // Group this rule belongs to.
  int64 group_id = 2;

  // Disabled rules remain stored but do not affect resolved membership.
  bool enabled = 3;

  oneof rule {
    // Grade/rank-based membership rule.
    GroupGradeRule grade = 10;

    // Qualification-based membership rule.
    GroupQualificationRule qualification = 11;
  }

  // User who created the rule.
  int64 created_by_user_id = 20;

  resources.timestamp.Timestamp created_at = 21;
  optional resources.timestamp.Timestamp updated_at = 22;
}

enum GroupMemberSource {
  GROUP_MEMBER_SOURCE_UNSPECIFIED = 0;

  // User was explicitly added to the group.
  GROUP_MEMBER_SOURCE_MANUAL = 1;

  // User matched one or more group rules.
  GROUP_MEMBER_SOURCE_RULE = 2;

  // User is a group leader.
  // Usually informational; leader status does not necessarily mean membership.
  GROUP_MEMBER_SOURCE_LEADER = 3;
}

message GroupMembershipReason {
  // Source category that explains why the user appears in the resolved view.
  GroupMemberSource source = 1;

  // Rule that caused the membership, if source is RULE.
  optional int64 rule_id = 2;

  // Human-readable explanation for UI display.
  // Example: "Manual member", "Grade >= 5", "Has qualification: Helicopter Pilot".
  optional string label = 3;
}

message GroupResolvedMember {
  // Group this resolved membership belongs to.
  int64 group_id = 1;

  // User being described.
  int64 user_id = 2;

  // True if the user is part of the final operational member set.
  bool is_member = 3;

  // True if the user is a group leader.
  bool is_leader = 4;

  // True if the user was excluded from final membership.
  bool is_excluded = 5;

  // High-level membership sources that apply to this user.
  repeated GroupMemberSource sources = 6;

  // Detailed explanations for the UI/admin view.
  repeated GroupMembershipReason reasons = 7;
}
