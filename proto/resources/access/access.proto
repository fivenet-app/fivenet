syntax = "proto3";

package resources.access;

import "buf/validate/validate.proto";
import "codegen/dbscanner/dbscanner.proto";
import "resources/users/short/user.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/access;resourcesaccess";

message Access {
  option (codegen.dbscanner.dbscanner) = {enabled: true};

  repeated JobAccess jobs = 1 [
    (buf.validate.field).repeated.max_items = 20,
    (tagger.tags) = "alias:\"job_access\""
  ];
  repeated UserAccess users = 2 [
    (buf.validate.field).repeated.max_items = 20,
    (tagger.tags) = "alias:\"user_access\""
  ];
  repeated QualificationAccess qualifications = 3 [
    (buf.validate.field).repeated.max_items = 20,
    (tagger.tags) = "alias:\"qualification_access\""
  ];
}

message JobAccess {
  int64 id = 1;
  // Was previously used for timestamp created_at field.
  reserved 2;
  int64 target_id = 3;
  string job = 4 [(buf.validate.field).string.max_len = 20];
  optional string job_label = 5 [(buf.validate.field).string.max_len = 50];
  int32 minimum_grade = 6 [(buf.validate.field).int32.gte = 0];
  optional string job_grade_label = 7 [(buf.validate.field).string.max_len = 50];
  int32 access = 8;
  optional bool required = 9;
  optional int32 required_access = 10;
}

message UserAccess {
  int64 id = 1;
  // Was previously used for timestamp created_at field.
  reserved 2;
  int64 target_id = 3;
  int32 user_id = 4 [(buf.validate.field).int32.gt = 0];
  optional resources.users.short.UserShort user = 5;
  int32 access = 6;
  optional bool required = 7;
  optional int32 required_access = 8;
}

message QualificationAccess {
  int64 id = 1;
  // Was previously used for timestamp created_at field.
  reserved 2;
  int64 target_id = 3;
  int64 qualification_id = 4 [(buf.validate.field).int64.gt = 0];
  int32 access = 6;
  optional bool required = 7;
  optional int32 required_access = 8;
}
