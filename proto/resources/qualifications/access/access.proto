syntax = "proto3";

package resources.qualifications.access;

import "buf/validate/validate.proto";
import "resources/access/access.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/qualifications/access;qualificationsaccess";

enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  ACCESS_LEVEL_BLOCKED = 1;
  ACCESS_LEVEL_VIEW = 2;
  ACCESS_LEVEL_REQUEST = 3;
  ACCESS_LEVEL_TAKE = 4;
  ACCESS_LEVEL_GRADE = 5;
  ACCESS_LEVEL_EDIT = 6;
}

message QualificationAccess {
  repeated resources.access.JobAccess jobs = 1;
}
