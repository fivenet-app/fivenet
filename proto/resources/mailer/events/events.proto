syntax = "proto3";

package resources.mailer.events;

import "buf/validate/validate.proto";
import "resources/mailer/emails/email.proto";
import "resources/mailer/messages/message.proto";
import "resources/mailer/settings/settings.proto";
import "resources/mailer/threads/thread.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/mailer/events;mailerevents";

message MailerEvent {
  oneof data {
    option (buf.validate.oneof).required = true;

    resources.mailer.emails.Email email_update = 1;
    int64 email_delete = 2;
    resources.mailer.settings.EmailSettings email_settings_updated = 3;

    resources.mailer.threads.Thread thread_update = 4;
    int64 thread_delete = 5;

    resources.mailer.threads.ThreadState thread_state_update = 6;

    resources.mailer.messages.Message message_update = 7;
    int64 message_delete = 8;
  }
}
