syntax = "proto3";

package resources.livemap.markers;

import "buf/validate/validate.proto";
import "codegen/dbscanner/dbscanner.proto";
import "codegen/sanitizer/sanitizer.proto";
import "resources/centrum/units/units.proto";
import "resources/jobs/colleagues/colleagues.proto";
import "resources/timestamp/timestamp.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/livemap/markers;livemapmarkers";

message UserMarker {
  int32 user_id = 1 [(buf.validate.field).int32.gt = 0];
  double x = 2;
  double y = 3;
  optional resources.timestamp.Timestamp updated_at = 4;
  optional string postal = 5 [
    (buf.validate.field).string.max_len = 48,
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  optional string color = 6 [
    (buf.validate.field).string = {
      len: 7
      pattern: "^#[A-Fa-f0-9]{6}$"
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  string job = 7 [(buf.validate.field).string.max_len = 20];
  string job_label = 8;
  optional int32 job_grade = 13;

  resources.jobs.colleagues.Colleague user = 9 [(tagger.tags) = "alias:\"user\""];
  optional int64 unit_id = 10;
  optional resources.centrum.units.Unit unit = 11;

  bool hidden = 12;

  optional UserMarkerData data = 14 [(tagger.tags) = "alias:\"data\""];
}

message UserMarkerData {
  option (codegen.dbscanner.dbscanner) = {enabled: true};

  optional NameOverride name_override = 1;

  bool is_in_vehicle = 2;
  optional string vehicle_plate = 3 [(buf.validate.field).string.max_len = 32];
  optional resources.timestamp.Timestamp vehicle_updated_at = 4;
}

message NameOverride {
  string firstname = 1;
  string lastname = 2;
}
