syntax = "proto3";

package resources.clientconfig;

import "google/protobuf/duration.proto";
import "buf/validate/validate.proto";
import "resources/settings/banner.proto";
import "resources/settings/config.proto";
import "resources/settings/data.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/clientconfig;clientconfig";

message ClientConfig {
  string version = 1 [(tagger.tags) = "json:\"version\""];

  string default_locale = 2 [(tagger.tags) = "json:\"defaultLocale\""];

  Auth auth = 3 [(tagger.tags) = "json:\"auth\""];
  Discord discord = 4 [(tagger.tags) = "json:\"discord\""];
  resources.settings.Website website = 5 [(tagger.tags) = "json:\"website\""];
  FeatureGates feature_gates = 6 [(tagger.tags) = "json:\"featureGates\""];
  Game game = 7 [(tagger.tags) = "json:\"game\""];
  System system = 8 [(tagger.tags) = "json:\"system\""];
  resources.settings.Display display = 9 [(tagger.tags) = "json:\"display\""];
  resources.settings.QuickButtons quick_buttons = 11 [(tagger.tags) = "json:\"quickButtons\""];
  resources.settings.Data data = 12 [(tagger.tags) = "json:\"data\""];
}

message Auth {
  bool signup_enabled = 1 [(tagger.tags) = "json:\"signupEnabled\""];
  bool last_char_lock = 2 [(tagger.tags) = "json:\"lastCharLock\""];
  repeated ProviderConfig providers = 3 [(tagger.tags) = "json:\"providers\""];
}

message ProviderConfig {
  string name = 1 [(tagger.tags) = "json:\"name\""];
  string label = 2 [(tagger.tags) = "json:\"label\""];
  optional string icon = 3 [(tagger.tags) = "json:\"icon,omitempty\""];
  string homepage = 4 [(tagger.tags) = "json:\"homepage\""];
}

message Discord {
  bool bot_enabled = 1 [(tagger.tags) = "json:\"botEnabled\""];
}

message FeatureGates {}

message Game {
  string unemployed_job_name = 1 [(tagger.tags) = "json:\"unemployedJobName\""];
  int32 start_job_grade = 2 [(tagger.tags) = "json:\"startJobGrade\""];

  resources.settings.Livemap livemap = 3 [(tagger.tags) = "json:\"livemap\""];

  bool max_wanted_duration_user_enabled = 4 [(tagger.tags) = "json:\"maxWantedDurationUserEnabled\""];
  optional google.protobuf.Duration max_wanted_duration_user = 5 [
    (buf.validate.field).duration = {
      gte: {seconds: 86400} /* 1 day */
      lte: {seconds: 315360000} /* 3650 days */
    },
    (tagger.tags) = "json:\"maxWantedDurationUser,omitempty\""
  ];
  bool max_wanted_duration_vehicle_enabled = 6 [(tagger.tags) = "json:\"maxWantedDurationVehicleEnabled\""];
  optional google.protobuf.Duration max_wanted_duration_vehicle = 7 [
    (buf.validate.field).duration = {
      gte: {seconds: 86400} /* 1 day */
      lte: {seconds: 315360000} /* 3650 days */
    },
    (tagger.tags) = "json:\"maxWantedDurationVehicle,omitempty\""
  ];
}

message System {
  bool banner_message_enabled = 1 [(tagger.tags) = "json:\"bannerMessageEnabled\""];
  optional resources.settings.BannerMessage banner_message = 2 [(tagger.tags) = "json:\"bannerMessage,omitempty\""];
  OTLPFrontend otlp = 3 [(tagger.tags) = "json:\"otlp\""];
}

message OTLPFrontend {
  bool enabled = 1 [(tagger.tags) = "json:\"enabled\""];
  string url = 2 [(tagger.tags) = "json:\"url\""];
  map<string, string> headers = 3 [(tagger.tags) = "json:\"headers\""];
}
