syntax = "proto3";

package resources.userinfo;

import "resources/accounts/accounts.proto";
import "resources/timestamp/timestamp.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/userinfo;userinfo";

message UserInfo {
  int64 account_id = 1;
  bool enabled = 2;
  string license = 3;
  optional int32 last_char = 4;

  int32 user_id = 5;
  string job = 6;
  int32 job_grade = 7;

  optional resources.accounts.AccountGroups groups = 8;

  bool can_be_superuser = 9;
  bool superuser = 10;
}

// PollReq: published to `userinfo.poll.request` when an active user connects or requests a refresh.
message PollReq {
  // The account the user belongs to
  int64 account_id = 1;

  // The unique user identifier within the account
  int32 user_id = 2;
}

// UserInfoChanged used to signal Job or JobGrade changes.
message UserInfoChanged {
  // The account the user belongs to
  int64 account_id = 1;
  // The unique user identifier within the account
  int32 user_id = 2;

  // Timestamp of when the change was detected
  resources.timestamp.Timestamp changed_at = 3;

  // Previous job title
  string old_job = 4;
  // New job title
  optional string new_job = 5;
  optional string new_job_label = 6;

  // Previous job grade
  int32 old_job_grade = 7;
  // New job grade
  optional int32 new_job_grade = 8;
  // New job grade label
  optional string new_job_grade_label = 9;

  // Can the user be superuser (by group or license)
  optional bool can_be_superuser = 10;
  // Superuser state
  optional bool superuser = 11;
}
