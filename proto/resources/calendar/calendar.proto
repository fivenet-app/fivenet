syntax = "proto3";

package resources.calendar;

import "buf/validate/validate.proto";
import "codegen/sanitizer/sanitizer.proto";
import "resources/calendar/access/access.proto";
import "resources/timestamp/timestamp.proto";
import "resources/users/short/user.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/calendar;calendar";

enum CalendarSystemKind {
  CALENDAR_SYSTEM_KIND_UNSPECIFIED = 0;
  CALENDAR_SYSTEM_KIND_JOB_BIRTHDAYS = 1;
}

message Calendar {
  int64 id = 1 [(tagger.tags) = "sql:\"primary_key\" alias:\"id\""];
  optional resources.timestamp.Timestamp created_at = 2;
  optional resources.timestamp.Timestamp updated_at = 3;
  optional resources.timestamp.Timestamp deleted_at = 4;
  optional string job = 5 [(buf.validate.field).string.max_len = 20];
  string name = 6 [
    (buf.validate.field).string = {
      min_len: 3
      max_len: 255
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  optional string description = 7;
  bool public = 8;
  bool closed = 9;
  string color = 10 [
    (buf.validate.field).string.max_len = 12,
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  optional int32 creator_id = 11 [(buf.validate.field).int32.gt = 0];
  optional resources.users.short.UserShort creator = 12 [(tagger.tags) = "alias:\"creator\""];
  string creator_job = 13 [(buf.validate.field).string.max_len = 20];
  optional CalendarSub subscription = 14;
  resources.calendar.access.CalendarAccess access = 15;
  optional CalendarSystemKind system_kind = 16 [(buf.validate.field).enum.defined_only = true];
}

message CalendarShort {
  int64 id = 1 [(tagger.tags) = "sql:\"primary_key\" alias:\"id\""];
  optional resources.timestamp.Timestamp created_at = 2;
  optional string job = 5 [(buf.validate.field).string.max_len = 20];
  string name = 6 [
    (buf.validate.field).string = {
      min_len: 3
      max_len: 255
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  optional string description = 7;
  bool public = 8;
  bool closed = 9;
  string color = 10 [
    (buf.validate.field).string.max_len = 12,
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  optional CalendarSub subscription = 14;
  optional CalendarSystemKind system_kind = 15 [(buf.validate.field).enum.defined_only = true];
}

message CalendarSub {
  int64 calendar_id = 1;
  int32 user_id = 2 [(buf.validate.field).int32.gte = 0];
  optional resources.users.short.UserShort user = 3;
  optional resources.timestamp.Timestamp created_at = 4;
  bool confirmed = 5;
  bool muted = 6;
}
