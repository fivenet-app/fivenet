syntax = "proto3";

package resources.calendar.entries;

import "buf/validate/validate.proto";
import "codegen/dbscanner/dbscanner.proto";
import "codegen/sanitizer/sanitizer.proto";
import "resources/calendar/calendar.proto";
import "resources/common/content/content.proto";
import "resources/timestamp/timestamp.proto";
import "resources/users/short/user.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/calendar/entries;calendarentries";

enum CalendarEntryOccurrenceKind {
  CALENDAR_ENTRY_OCCURRENCE_KIND_UNSPECIFIED = 0;
  CALENDAR_ENTRY_OCCURRENCE_KIND_MANUAL = 1;
  CALENDAR_ENTRY_OCCURRENCE_KIND_RECURRING = 2;
  CALENDAR_ENTRY_OCCURRENCE_KIND_BIRTHDAY = 3;
}

message CalendarEntryOccurrence {
  string key = 1 [(buf.validate.field).string.max_len = 128];
  CalendarEntryOccurrenceKind kind = 2 [(buf.validate.field).enum.defined_only = true];
  optional int64 source_entry_id = 3;
  optional int32 source_user_id = 4 [(buf.validate.field).int32.gte = 0];
  bool all_day = 5;
}

message CalendarEntry {
  int64 id = 1 [(tagger.tags) = "sql:\"primary_key\" alias:\"id\""];
  optional resources.timestamp.Timestamp created_at = 2;
  optional resources.timestamp.Timestamp updated_at = 3;
  optional resources.timestamp.Timestamp deleted_at = 4;
  int64 calendar_id = 5;
  optional resources.calendar.Calendar calendar = 6;
  optional string job = 7 [(buf.validate.field).string.max_len = 20];
  resources.timestamp.Timestamp start_time = 8;
  optional resources.timestamp.Timestamp end_time = 9;
  string title = 10 [
    (buf.validate.field).string = {
      min_len: 3
      max_len: 512
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  resources.common.content.Content content = 11;
  bool closed = 12;
  optional bool rsvp_open = 13;
  optional int32 creator_id = 14 [(buf.validate.field).int32.gt = 0];
  optional resources.users.short.UserShort creator = 15 [(tagger.tags) = "alias:\"creator\""];
  string creator_job = 16 [(buf.validate.field).string.max_len = 20];
  optional CalendarEntryRecurring recurring = 17;
  optional CalendarEntryRSVP rsvp = 18;
  optional CalendarEntryOccurrence occurrence = 19;
}

enum CalendarEntryRecurringEvery {
  CALENDAR_ENTRY_RECURRING_EVERY_UNSPECIFIED = 0;
  CALENDAR_ENTRY_RECURRING_EVERY_DAY = 1;
  CALENDAR_ENTRY_RECURRING_EVERY_WEEK = 2;
  CALENDAR_ENTRY_RECURRING_EVERY_MONTH = 3;
  CALENDAR_ENTRY_RECURRING_EVERY_YEAR = 4;
}

message CalendarEntryRecurring {
  option (codegen.dbscanner.dbscanner) = {enabled: true};

  CalendarEntryRecurringEvery every = 1 [(buf.validate.field).enum.defined_only = true];
  int32 count = 2;
  optional resources.timestamp.Timestamp until = 3;
}

enum RsvpResponses {
  RSVP_RESPONSES_UNSPECIFIED = 0;
  RSVP_RESPONSES_HIDDEN = 1;
  RSVP_RESPONSES_INVITED = 2;
  RSVP_RESPONSES_NO = 3;
  RSVP_RESPONSES_MAYBE = 4;
  RSVP_RESPONSES_YES = 5;
}

message CalendarEntryRSVP {
  int64 entry_id = 1;
  optional resources.timestamp.Timestamp created_at = 2;
  int32 user_id = 3 [(buf.validate.field).int32.gt = 0];
  optional resources.users.short.UserShort user = 4;
  RsvpResponses response = 5 [(buf.validate.field).enum.defined_only = true];
  optional string occurrence_key = 6 [(buf.validate.field).string.max_len = 128];
}
