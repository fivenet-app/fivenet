syntax = "proto3";

package resources.settings;

import "buf/validate/validate.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/settings;settings";

message Data {
  DataMode mode = 1 [(buf.validate.field).enum.defined_only = true];
}

enum DataMode {
  DATA_MODE_UNSPECIFIED = 0;
  DATA_MODE_UNAVAILABLE = 1;
  DATA_MODE_READONLY = 2;
  DATA_MODE_READWRITE = 3;
}
