syntax = "proto3";

package resources.accounts;

import "buf/validate/validate.proto";
import "resources/accounts/oauth2/oauth2.proto";
import "resources/timestamp/timestamp.proto";
import "resources/users/user.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/accounts;accounts";

message Account {
  int64 id = 1 [(tagger.tags) = "sql:\"primary_key\""];
  optional resources.timestamp.Timestamp created_at = 2;
  optional resources.timestamp.Timestamp updated_at = 3;
  optional resources.timestamp.Timestamp deleted_at = 4;
  bool enabled = 5;
  string username = 6 [(buf.validate.field).string.max_len = 24];
  string license = 7 [(buf.validate.field).string.max_len = 64];

  optional AccountGroups groups = 8;

  optional int32 last_char = 9 [(buf.validate.field).int32.gt = 0];

  repeated resources.accounts.oauth2.OAuth2Account oauth2_accounts = 10 [
    (buf.validate.field).repeated.max_items = 10,
    (tagger.tags) = "alias:\"oauth2_account\""
  ];
}

message AccountGroups {
  repeated string groups = 1 [(buf.validate.field).repeated.max_items = 20];
}

message Character {
  bool available = 1;
  string group = 2;
  resources.users.User char = 3 [(tagger.tags) = "alias:\"user\""];
}
