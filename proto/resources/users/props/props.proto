syntax = "proto3";

package resources.users.props;

import "buf/validate/validate.proto";
import "codegen/sanitizer/sanitizer.proto";
import "resources/file/file.proto";
import "resources/jobs/jobs.proto";
import "resources/timestamp/timestamp.proto";
import "resources/citizens/labels/labels.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/users/props;usersprops";

message UserProps {
  int32 user_id = 1 [(buf.validate.field).int32.gte = 0];
  optional resources.timestamp.Timestamp updated_at = 2;

  optional bool wanted = 3;
  optional resources.timestamp.Timestamp wanted_at = 4;
  optional resources.timestamp.Timestamp wanted_till = 5;
  optional string job_name = 6 [(tagger.tags) = "alias:\"job\""];
  optional resources.jobs.Job job = 7;
  optional int32 job_grade_number = 8 [(tagger.tags) = "alias:\"job_grade\""];
  optional resources.jobs.JobGrade job_grade = 9;
  optional uint32 traffic_infraction_points = 10;
  optional resources.timestamp.Timestamp traffic_infraction_points_updated_at = 11;
  optional int64 open_fines = 12;
  optional string blood_type = 13;
  optional int64 mugshot_file_id = 14;
  optional resources.file.File mugshot = 15 [(tagger.tags) = "alias:\"mugshot\""];
  optional resources.citizens.labels.Labels labels = 16;
  optional string email = 17 [
    (buf.validate.field).string = {
      min_len: 6
      max_len: 80
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
}
