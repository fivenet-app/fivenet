syntax = "proto3";

package resources.users.labels;

import "buf/validate/validate.proto";
import "codegen/dbscanner/dbscanner.proto";
import "codegen/sanitizer/sanitizer.proto";
import "google/protobuf/duration.proto";
import "resources/timestamp/timestamp.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/users/labels;userslabels";

message Labels {
  option (codegen.dbscanner.dbscanner) = {enabled: true};

  repeated Label list = 1 [(buf.validate.field).repeated.max_items = 10];
}

message Label {
  int64 id = 1 [(tagger.tags) = "sql:\"primary_key\" alias:\"id\""];
  resources.timestamp.Timestamp created_at = 2;
  optional resources.timestamp.Timestamp updated_at = 3;

  optional string job = 4 [(buf.validate.field).string.max_len = 20];
  string name = 5 [
    (buf.validate.field).string.max_len = 48,
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  string color = 6 [
    (buf.validate.field).string = {
      len: 7
      pattern: "^#[A-Fa-f0-9]{6}$"
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];

  optional LabelExpiration expiration = 7;
  // TODO add options for expiration window
}

message LabelExpiration {
  option (codegen.dbscanner.dbscanner) = {enabled: true};

  optional google.protobuf.Duration min_duration = 1 [(buf.validate.field).duration = {
    gte: {seconds: 900} /* 15 minutes */
    lte: {seconds: 315360000} /* 10 years */
  }];
  optional google.protobuf.Duration max_duration = 2 [(buf.validate.field).duration = {
    gte: {seconds: 900} /* 15 minutes */
    lte: {seconds: 315360000} /* 10 years */
  }];
}
