syntax = "proto3";

package resources.documents;

import "buf/validate/validate.proto";
import "codegen/sanitizer/sanitizer.proto";
import "resources/common/content/content.proto";
import "resources/documents/category/category.proto";
import "resources/documents/data/data.proto";
import "resources/documents/pins/pins.proto";
import "resources/documents/workflow/workflow.proto";
import "resources/file/file.proto";
import "resources/timestamp/timestamp.proto";
import "resources/users/short/user.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/documents;documents";

message Document {
  int64 id = 1;
  resources.timestamp.Timestamp created_at = 2;
  optional resources.timestamp.Timestamp updated_at = 3;
  optional resources.timestamp.Timestamp deleted_at = 4;
  optional int64 category_id = 5;
  optional resources.documents.category.Category category = 6 [(tagger.tags) = "alias:\"category\""];
  string title = 7 [
    (buf.validate.field).string = {
      min_len: 3
      max_len: 512
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  // Derived field (server authored)
  optional uint32 word_count = 21;
  // Derived field (server authored)
  optional string first_heading = 22;
  resources.common.content.ContentType content_type = 8 [(buf.validate.field).enum.defined_only = true];
  resources.common.content.Content content = 9 [(tagger.tags) = "alias:\"content_json\""];
  optional resources.documents.data.DocumentData data = 10 [(tagger.tags) = "alias:\"data\""];
  optional int32 creator_id = 11 [(buf.validate.field).int32.gt = 0];
  optional resources.users.short.UserShort creator = 12 [(tagger.tags) = "alias:\"creator\""];
  string creator_job = 13 [(buf.validate.field).string.max_len = 20];
  optional string creator_job_label = 14 [(buf.validate.field).string.max_len = 50];
  DocumentMeta meta = 15 [(tagger.tags) = "alias:\"meta\""];
  optional int64 template_id = 16;
  optional resources.documents.pins.DocumentPin pin = 17 [(tagger.tags) = "alias:\"pin\""];
  optional resources.documents.workflow.WorkflowState workflow_state = 18;
  optional resources.documents.workflow.WorkflowUserState workflow_user = 19;
  repeated resources.file.File files = 20 [(tagger.tags) = "alias:\"files\""];
}

message DocumentShort {
  int64 id = 1;
  resources.timestamp.Timestamp created_at = 2;
  optional resources.timestamp.Timestamp updated_at = 3;
  optional resources.timestamp.Timestamp deleted_at = 4;
  optional int64 category_id = 5;
  optional resources.documents.category.Category category = 6 [(tagger.tags) = "alias:\"category\""];
  string title = 7 [
    (buf.validate.field).string = {
      min_len: 3
      max_len: 512
    },
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];
  // Derived field (server authored)
  optional uint32 word_count = 21;
  // Derived field (server authored)
  optional string first_heading = 22;
  resources.common.content.ContentType content_type = 8 [(buf.validate.field).enum.defined_only = true];
  resources.common.content.Content content = 9;
  optional int32 creator_id = 11 [(buf.validate.field).int32.gt = 0];
  optional resources.users.short.UserShort creator = 12 [(tagger.tags) = "alias:\"creator\""];
  string creator_job = 13 [(buf.validate.field).string.max_len = 20];
  optional string creator_job_label = 14 [(buf.validate.field).string.max_len = 50];
  DocumentMeta meta = 15 [(tagger.tags) = "alias:\"meta\""];
  optional resources.documents.pins.DocumentPin pin = 17 [(tagger.tags) = "alias:\"pin\""];
  optional resources.documents.workflow.WorkflowState workflow_state = 18;
  optional resources.documents.workflow.WorkflowUserState workflow_user = 19;
}

message DocumentMeta {
  int64 document_id = 1;

  optional resources.timestamp.Timestamp recomputed_at = 2;

  bool closed = 3;
  bool draft = 4;
  bool public = 5;
  string state = 6 [
    (buf.validate.field).string.max_len = 32,
    (codegen.sanitizer.sanitizer) = {enabled: true}
  ];

  // Overall aggregates - At least one approval policy fully satisfied
  optional bool approved = 7;

  // Approval rollups
  // Total approvals needed across policies
  optional int32 ap_required_total = 16;
  // Approvals collected
  optional int32 ap_collected_approved = 17;
  // How many left to satisfy
  optional int32 ap_required_remaining = 18;
  // Number of declines
  optional int32 ap_declined_count = 19;
  // Tasks still pending (optional)
  optional int32 ap_pending_count = 20;
  // Quick flag if any declines
  optional bool ap_any_declined = 21;
  // Number of active approval policies
  optional int32 ap_policies_active = 22;

  // Number of comments on the document
  optional int32 comment_count = 23;
}
