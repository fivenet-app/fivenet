syntax = "proto3";

package resources.documents.comment;

import "buf/validate/validate.proto";
import "resources/common/content/content.proto";
import "resources/timestamp/timestamp.proto";
import "resources/users/short/user.proto";
import "tagger/tagger.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/documents/comment;documentscomment";

message Comment {
  int64 id = 1 [(tagger.tags) = "alias:\"id\""];
  optional resources.timestamp.Timestamp created_at = 2;
  optional resources.timestamp.Timestamp updated_at = 3;
  optional resources.timestamp.Timestamp deleted_at = 4;
  int64 document_id = 5;
  resources.common.content.Content content = 6;
  optional int32 creator_id = 7 [(buf.validate.field).int32.gt = 0];
  optional resources.users.short.UserShort creator = 8 [(tagger.tags) = "alias:\"creator\""];
  string creator_job = 9 [(buf.validate.field).string.max_len = 20];
}
