syntax = "proto3";

package resources.documents.stamps;

import "buf/validate/validate.proto";
import "codegen/sanitizer/sanitizer.proto";
import "resources/access/access.proto";
import "resources/timestamp/timestamp.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/documents/stamps;documentsstamps";

enum StampAccessLevel {
  STAMP_ACCESS_LEVEL_UNSPECIFIED = 0;
  STAMP_ACCESS_LEVEL_BLOCKED = 1;
  STAMP_ACCESS_LEVEL_USE = 2;
  STAMP_ACCESS_LEVEL_MANAGE = 3;
}

message Stamp {
  int64 id = 1;
  string job = 2 [(buf.validate.field).string.max_len = 20];
  optional string job_label = 3;
  resources.timestamp.Timestamp created_at = 4;

  string name = 5 [
    (buf.validate.field).string.max_len = 120,
    (codegen.sanitizer.sanitizer) = {
      enabled: true
      strip_html_tags: true
    }
  ];

  // Parameterized SVG with slots
  string svg_template = 6 [(codegen.sanitizer.sanitizer) = {
    enabled: true
    method: "SanitizeSVG"
  }];

  resources.access.Access access = 7;
}
