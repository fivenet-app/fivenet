syntax = "proto3";

package resources.stats;

import "resources/timestamp/timestamp.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/resources/stats;stats";

message Stat {
  optional int32 value = 1;
}

enum StatsCategory {
  STATS_CATEGORY_UNSPECIFIED = 0;
  STATS_CATEGORY_CUSTOM = 1;
  STATS_CATEGORY_DOCUMENTS_BY_CATEGORY = 2;
  STATS_CATEGORY_TOP_LAWS = 3;
  STATS_CATEGORY_PENALTIES_OVER_TIME = 4;
  STATS_CATEGORY_EMPLOYEE_COUNT_OVER_TIME = 5;
}

enum StatsPeriod {
  STATS_PERIOD_UNSPECIFIED = 0;
  STATS_PERIOD_DAILY = 1;
  STATS_PERIOD_WEEKLY = 2;
  STATS_PERIOD_MONTHLY = 3;
}

message KeyValue {
  string key = 1;
  int64 value = 2;
}

message DailyValue {
  resources.timestamp.Timestamp day = 1;
  int64 value = 2;
}

message PeriodSeriesValue {
  resources.timestamp.Timestamp day = 1;
  string key = 2;
  string label = 3;
  int64 value = 4;
}

message CategoryValue {
  int64 id = 1;
  string name = 2;
  optional string color = 3;
  optional string icon = 4;
  int64 value = 5;
}
