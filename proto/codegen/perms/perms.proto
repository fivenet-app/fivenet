syntax = "proto3";

package codegen.perms;

import "buf/validate/validate.proto";
import "google/protobuf/descriptor.proto";
import "resources/permissions/attributes/attributes.proto";

option go_package = "github.com/fivenet-app/fivenet/v2026/gen/go/proto/codegen/perms;perms";

extend google.protobuf.MethodOptions {
  PermsOptions perms = 51002;
}

message PermsOptions {
  bool enabled = 1;
  optional string namespace = 2;
  optional string service = 3;
  optional string name = 4;
  repeated string names = 5;

  int32 order = 6;
  repeated Attr attrs = 7;
  bool internal = 8;
}

message Attr {
  string key = 1;
  string value = 2;
  resources.permissions.attributes.AttributeType type = 3 [(buf.validate.field).enum.defined_only = true];

  repeated string valid_string_list = 4;
}

extend google.protobuf.ServiceOptions {
  ServiceOptions perms_svc = 51005;
}

message ServiceOptions {
  int32 order = 1;
  optional string icon = 2;

  optional string namespace = 3;
  optional string service = 4;

  repeated AdditionalServicePerm additional_perms = 5;
}

message AdditionalServicePerm {
  string name = 3;
  int32 order = 4;
  repeated Attr attrs = 5;
}
