<link rel="stylesheet" href="/css/herofull-pattern.css" />

<style>
    .loader {
        position: fixed;
        inset: 0;
        z-index: 99999999;
        user-select: none;
        background-color: #1a202c;
    }
    .loader-overlay {
        position: relative;
        isolation: isolate;
        display: flex;
        min-height: 100vh;
        min-height: 100dvh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 50px;
        text-align: center;
    }
    .loader-overlay-img,
    .loader-spinner {
        margin: 0;
    }
    .loader-overlay img,
    .loader-spinner svg {
        width: 92px;
        height: 92px;
    }
    .loader-spinner svg {
        fill: #fff;
        animation: spin 900ms linear infinite;
    }

    .hero-overlay > * {
        position: relative;
        z-index: 1;
    }

    @media (prefers-reduced-motion: reduce) {
        .loader-spinner svg {
            animation: none;
        }
    }

    @keyframes spin {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }
</style>

<div class="loader hero">
    <div class="loader-overlay hero-overlay">
        <div class="loader-overlay-img">
            <img src="/images/logo-200x200.webp" width="92" height="92" alt="FiveNet Logo" decoding="async" />
        </div>

        <div class="loader-spinner">
            <!-- Material Design Icons (MDI) - Loading Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12,4V2A10,10 0 0,0 2,12H4A8,8 0 0,1 12,4Z" />
            </svg>
        </div>
    </div>
</div>
